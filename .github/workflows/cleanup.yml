name: Cleanup
permissions: write-all
on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: clean
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Delete Older Releases and Workflows
        uses: ophub/delete-releases-workflows@main
        with:
          delete_releases: true
          delete_tags: true
          releases_keep_latest: 98
          delete_workflows: true
          workflows_keep_day: 3
          releases_keep_keyword: stable/beta
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Archive Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/cleanup-archive-assets.py
