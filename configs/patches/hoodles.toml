enable-module-update = true
patches-version = "dev"
[github-morphe-hoodles]
enabled = true
app-name = "github"
rv-brand = "morphe"
build-mode = "apk"
cli-source = "MorpheApp/morphe-desktop"
uptodown-dlurl = "https://github-android.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/github/github-2"
dpi = "nodpi anydpi"
# archive-dlurl = "https://archive.org/download/geologically/apks/com.github.android"
[[github-morphe-hoodles.patches]]
source = "hoo-dles/morphe-patches"
included-patches = "'AMOLED dark theme'"
brand = "hoodles"

[prime-video-morphe-hoodles]
enabled = true
app-name = "prime-video"
rv-brand = "morphe"
build-mode = "apk"
version = "latest"
arch = "arm64-v8a"
cli-source = "MorpheApp/morphe-desktop"
apkmirror-dlurl = "https://www.apkmirror.com/apk/amazon-mobile-llc/amazon-prime-video/"
uptodown-dlurl = "https://amazon-video.en.uptodown.com/android"
dpi = "nodpi anydpi auto"
[[prime-video-morphe-hoodles.patches]]
source = "hoo-dles/morphe-patches"
brand = "hoodles"
excluded-patches = "'Rename Shared Permissions'"
