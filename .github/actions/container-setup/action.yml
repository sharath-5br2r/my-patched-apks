name: Setup Container
description: Setup Container
runs:
  using: "composite"
  steps:
    - name: Start Redis and Trawl
      shell: bash
      run: |
        docker run -d --name redis -p 6379:6379 redis:alpine
        docker run -d -e REDIS_URL=redis://redis:6379 --name Trawl -p 8191:8191 ghcr.io/germondai/trawl:latest 
        echo "[*] Waiting for Trawl to start..."
        for i in $(seq 1 30); do
          if curl -s http://localhost:8191/ > /dev/null 2>&1; then
            echo "[+] Trawl is ready."
            echo "CF_BYPASS_SOLVER_FS_8191_ENABLED=true" >> "$GITHUB_ENV"
            break
          fi
          sleep 2
        done
