name: "Release"

on:
  workflow_call:
    inputs:
      build-id:
        description: 'Identifier for workflows and caching'
        type: string
        required: true
      devel:
        description: 'Development mode (disables update checker)'
        type: string
        required: true
      status:
        description: 'The result of the prior build step.'
        type: string
        required: true

jobs:
  release:
    name: "Release"

    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      # FJ_TOKEN: "${{ secrets.FORGEJO_TOKEN }}"

      # B2_TOKEN: "${{ secrets.B2_TOKEN }}"
      # B2_KEY: "${{ secrets.B2_KEY }}"

      # CF_ZONE_ID: "${{ secrets.CF_ZONE_ID }}"
      # CF_TOKEN: "${{ secrets.CF_TOKEN }}"

      # VPS_SSH_HOST: "${{ secrets.VPS_SSH_HOST }}"
      # VPS_SSH_PORT: "${{ secrets.VPS_SSH_PORT }}"
      # VPS_SSH_PRIV: "${{ secrets.VPS_SSH_PRIV }}"
      # VPS_SSH_PUB: "${{ secrets.VPS_SSH_PUB }}"
      # DISCORD_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK }}"
      DEVEL: "${{ inputs.devel }}"
      STATUS: "${{ inputs.status }}"
      BUILD_ID: "${{ inputs.build-id }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: Eden-CI

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          skip-decompress: true
          merge-multiple: true

      - name: Load environments
        run: |
          export FORGEJO_LENV=forgejo.env
          [ -f "$FORGEJO_LENV" ] || exit 0

          . ./.ci/fj/load-env.sh
          . ./.ci/release/steps.sh | tee -a "$GITHUB_ENV"

      - name: Get Next Version Code
        id: version
        env:
         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          YEAR=$(date -u +"%y")
          TAG=$( { gh release list --exclude-drafts -L 100 2>/dev/null || true; } | awk -F '\t' -v year="$YEAR" '$3 ~ "^" year "[0-9][0-9][0-9][0-9]$" {print $3}' | sort -nr | head -n1 )
          if [ -n "$TAG" ]; then
              BUILD_COUNT=${TAG:2:4}
              BUILD_COUNT=$((10#$BUILD_COUNT + 1))
          else
              BUILD_COUNT=1
          fi

          NEXT_VER_CODE=$(printf "%s%04d" "$YEAR" "$BUILD_COUNT")
          if [ -n "${GITHUB_OUTPUT:-}" ]; then
              echo "NEXT_VER_CODE=$NEXT_VER_CODE" >> "$GITHUB_OUTPUT"
          else
              export NEXT_VER_CODE="$NEXT_VER_CODE"
          fi
      # - name: Delete Previous PR Number
      #   if: ${{ env.RELEASE_PR == '1' }}
      #   run: gh release delete "$FORGEJO_PR_NUMBER" --repo "$RELEASE_REPO" --cleanup-tag -y
      #   continue-on-error: true
      - name: Release
        id: release_notes
        if: ${{ always() }}
        run: ./.ci/release.sh
        env:
         NEXT_VER_CODE: ${{ steps.version.outputs.NEXT_VER_CODE }}
      # - name: Release
      #   id: release
      #   uses: softprops/action-gh-release@v2.5.0
      #   with:
      #     #name: "${{ env.GITHUB_TITLE }}"
      #     tag_name: ${{ env.GITHUB_TAG }}
      #     #repository: ${{ env.RELEASE_REPO }}
      #     body_path: ./changelog.md
      #     #token: ${{ env.GH_TOKEN }}
      #     prerelease: false
      #     draft: ${{ inputs.build-id == 'tag' }}
      #     generate_release_notes: false
      #     make_latest: true
      #     files: |
      #       artifacts/*


      - name: Upload to release (Archive)
        uses: softprops/action-gh-release@v3
        with:
          files: ./*.apk
          tag_name: beta
          overwrite_files: true
          prerelease: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.NEXT_VER_CODE }}
          name: Build No. ${{ steps.version.outputs.NEXT_VER_CODE }} 
          prerelease: true
          overwrite_files: true
          make_latest: true
          files: ./*.apk
          body_path: changelog.md

      - name: Upload changelog
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: changelog.md
          archive: false
