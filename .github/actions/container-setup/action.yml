name: Setup Container
description: Setup Container
runs:
  using: "composite"
  steps:
    - name: Start FlareSolverr
      shell: bash
      run: |
        docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
        echo "[*] Waiting for FlareSolverr to start..."
        for i in $(seq 1 30); do
          if curl -s http://localhost:8191/ > /dev/null 2>&1; then
            echo "[+] FlareSolverr is ready."
            break
          fi
          sleep 2
        done
        echo "CF_BYPASS_SOLVER=flaresolverr" >> "$GITHUB_ENV"
    - name: Start Byparr
      if: false
      shell: bash
      run: |
        docker run -d --name byparr -p 8192:8191 ghcr.io/thephaseless/byparr:latest
        echo "[*] Waiting for byparr to start..."
        for i in $(seq 1 30); do
          if curl -s http://localhost:8191/ > /dev/null 2>&1; then
            echo "[+] Byparr is ready."
            break
          fi
          sleep 2
        done
        echo "CF_BYPASS_SOLVER=byparr" >> "$GITHUB_ENV"
    - name: Start CloudflareBypassForScraping
      shell: bash
      run: |
        docker run -d --name cloudflarebypass -p 8000:8000 ghcr.io/sarperavci/cloudflarebypassforscraping:latest
        echo "[*] Waiting for CloudflareBypassForScraping to start..."
        for i in $(seq 1 30); do
          if curl -s http://localhost:8000/ > /dev/null 2>&1; then
            echo "[+] CloudflareBypassForScraping is ready."
            break
          fi
          sleep 2
        done
        echo "CF_BYPASS_SOLVER=cloudflarebypassforscraping" >> "$GITHUB_ENV"
