name: Update Releases Website Cache

on:
  workflow_call:
  schedule:
    - cron: "0 2 * * *" # 02:00 AM UTC everyday
  workflow_dispatch:

concurrency:
  group: cache
  cancel-in-progress: true

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with: 
          ref: gh-pages

      - name: Fetch releases from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --paginate repos/sharath-5br2r/patched-apks-builder-2nd/releases > releases_new.json

          # Validate: must be a non-empty JSON array
          COUNT=$(jq 'if type == "array" then length else 0 end' releases_new.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::GitHub API returned an empty releases array. Aborting to preserve existing cache."
            exit 1
          fi

          echo "Fetched $COUNT releases. Updating cache."
          mv releases_new.json releases.json

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "update releases cache"
          commit_author: Sharath <sharathsukash@gmail.com> # You can remove this or replace with your own name/email
          file_pattern: releases.json
