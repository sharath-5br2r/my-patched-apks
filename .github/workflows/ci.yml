name: CI
permissions: write-all
on:
  schedule:
    - cron: "20 */4 * * *" # Every 4 hours
  workflow_dispatch:

concurrency:
  group: ci
  cancel-in-progress: false

jobs:
  check_patch:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      trigger_stable: ${{ steps.effective_triggers.outputs.TRIGGER_STABLE }}
      trigger_prerelease: ${{ steps.effective_triggers.outputs.TRIGGER_PRERELEASE }}
      trigger_predl_stable: ${{ steps.effective_triggers.outputs.TRIGGER_PREDL_STABLE }}
      trigger_predl_prerelease: ${{ steps.effective_triggers.outputs.TRIGGER_PREDL_PRERELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
      - name: Setup Container
        uses: ./.github/actions/container-setup
      - name: Ensure patch_sources.json exists
        id: ensure_patch_sources
        run: bash .github/scripts/ci_ensure_patch_sources.sh

      - name: Commit dummy patch_sources.json if created
        if: steps.ensure_patch_sources.outputs.created == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          skip_checkout: true
          file_pattern: .github/configs/patch_sources.json
          commit_message: "Create dummy patch_sources.json"
      - name: Update Morphe Experimental App versions
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: bash ./scripts/morphe-experimental.sh
      - name: Fetch latest tags
        if: steps.ensure_patch_sources.outputs.created == 'false'
        id: fetch_tags
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: bash .github/scripts/ci_fetch_tags.sh

      - name: Compare latest vs stored tags
        if: steps.ensure_patch_sources.outputs.created == 'false'
        id: compare
        env:
          LATEST_TAGS: ${{ steps.fetch_tags.outputs.latest }}
        run: |
          bash .github/scripts/ci_compare_tags.sh

      - name: Fetch App Versions
        if: steps.ensure_patch_sources.outputs.created == 'false'
        id: fetch_app_versions
        run: bash .github/scripts/ci_fetch_app_versions.sh
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        
      - name: Compare App Versions
        if: steps.ensure_patch_sources.outputs.created == 'false'
        id: compare_apps
        env:
          FETCHED_APP_VERSIONS: ${{ steps.fetch_app_versions.outputs.fetched }}
        run: bash .github/scripts/ci_compare_app_versions.sh

      - name: Generate configs (JSON)
        if: ${{ steps.compare.outputs.TRIGGER_STABLE == '1' || steps.compare.outputs.TRIGGER_PRERELEASE == '1' || steps.compare.outputs.TRIGGER_BLOCKED == '1' || steps.compare_apps.outputs.TRIGGER_APP_UPDATE == '1' }}
        id: generate_configs
        env:
          TAGS_OLD: ${{ steps.compare.outputs.tags_old }}
          TAGS_NEW: ${{ steps.compare.outputs.tags_new }}
          TRIGGER_STABLE: ${{ steps.compare.outputs.TRIGGER_STABLE }}
          TRIGGER_PRERELEASE: ${{ steps.compare.outputs.TRIGGER_PRERELEASE }}
          TRIGGER_APP_UPDATE: ${{ steps.compare_apps.outputs.TRIGGER_APP_UPDATE }}
        run: bash .github/scripts/ci_generate_configs.sh

      - name: Resolve effective triggers
        id: effective_triggers
        env:
          CREATED: ${{ steps.ensure_patch_sources.outputs.created }}
          RAW_TRIGGER_STABLE: ${{ steps.compare.outputs.TRIGGER_STABLE || '0' }}
          RAW_TRIGGER_PRERELEASE: ${{ steps.compare.outputs.TRIGGER_PRERELEASE || '0' }}
          RAW_TRIGGER_APP_UPDATE: ${{ steps.compare_apps.outputs.TRIGGER_APP_UPDATE || '0' }}
        run: bash .github/scripts/ci_resolve_triggers.sh
      - name: Cleanup docker containers
        uses: ./.github/actions/cleanup-container
        if: always()

      - name: Commit updated patch sources and configs
        if: ${{ steps.ensure_patch_sources.outputs.created == 'false' && (steps.compare.outputs.TRIGGER_STABLE == '1' || steps.compare.outputs.TRIGGER_PRERELEASE == '1' || steps.compare.outputs.TRIGGER_BLOCKED == '1' || steps.compare_apps.outputs.TRIGGER_APP_UPDATE == '1') }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_author: Sharath <sharathsukash@gmail.com>
          file_pattern: .github/configs/*.json
          commit_message: "Update patch sources, app versions and generated configs [skip ci]"


  build_dev:
    needs: [check_patch]
    if: ${{ always() && needs.check_patch.outputs.trigger_prerelease == '1' }}
    uses: ./.github/workflows/build.yml
    with:
      config_file: ".github/configs/config.dev.updated.downstream.json"
    secrets: inherit
  build_predl:
    needs: [check_patch, build_dev]
    if: ${{ always() && ( needs.build_dev.result != 'cancelled' && needs.check_patch.outputs.trigger_predl_prerelease == '1' ) }}
    uses: ./.github/workflows/build.yml
    with:
      config_file: ".github/configs/config.dev.updated.predl.json"
    secrets: inherit
  build_custom:
    needs: [check_patch, build_dev, build_predl]
    if: ${{ always() && ( needs.build_dev.result != 'cancelled' && needs.build_predl.result != 'cancelled') }}
    uses: ./.github/workflows/build.yml
    with:
      config_file: "dev_custom.sh"
    secrets: inherit
  
  trigger_cleanup:
    needs: [build_dev, build_custom, build_predl]
    if: ${{ always() && (needs.build_predl.result == 'success' || needs.build_dev.result == 'success' || needs.build_custom.result == 'success') }}
    uses: ./.github/workflows/cleanup.yml
    secrets: inherit

  trigger_website_update:
    needs: [build_dev, build_custom, build_predl]
    if: ${{ always() && ( needs.build_dev.result == 'success' || needs.build_custom.result == 'success' || needs.build_predl.result == 'success') }}
    uses: ./.github/workflows/update-cache.yml
    secrets: inherit


