name: Build

on:
  workflow_call:
    inputs:
      config_file:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      config_file:
        description: "Select the config file to use"
        required: true
        type: choice
        default: "configs/config.toml"
        options:
          - "configs/config.dev.toml"
          - "configs/config.stable.toml"
          - "configs/config.manual.toml"
          - ".github/configs/config.dev.updated.downstream.json"
          - ".github/configs/config.stable.updated.downstream.json"
          - "Enter Manually"
      manual_config_file:
        description: "Enter the config file path manually (only if 'Enter Manually' is selected above)"
        required: false
        type: string
concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          submodules: true
      - name: Setup docker
        uses: ./.github/actions/container-setup
      - name: Resolve config file
        id: config
        run: |
          if [[ "${{ inputs.config_file }}" == "Enter Manually" ]]; then
            echo "CONFIG_FILE=${{ inputs.manual_config_file }}" >> "$GITHUB_ENV"
          else
            echo "CONFIG_FILE=${{ inputs.config_file }}" >> "$GITHUB_ENV"
          fi
      - name: Resolve build context
        id: context
        run: bash .github/scripts/build_resolve_context.sh "${{ env.CONFIG_FILE }}"

      - name: Resolve version code
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/build_resolve_version.sh
      - name: Build modules and apks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_VER_CODE: ${{ steps.version.outputs.NEXT_VER_CODE }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEYSTORE_ALIAS: sharath
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_P12: ${{ secrets.KEYSTORE_P12 }}
        run: |
          set -euo pipefail
          bash ./scripts/prep_build_predl.sh
          bash ./build.sh "${{ steps.context.outputs.CONFIG_FILE }}"

      - name: Get output
        id: get_output
        run: bash .github/scripts/build_get_output.sh

      - name: Update readme
        run: |
          python3 scripts/update-readme.py ${{ steps.version.outputs.NEXT_VER_CODE }} "$GITHUB_REPOSITORY"

      - name: Commit updated readme
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_author: Sharath <sharathsukash@gmail.com> # Remove if not needed, or replace with your own name/emails
          file_pattern: README.md
          commit_message: "Update README for Build No. ${{ steps.version.outputs.NEXT_VER_CODE }} [skip ci]"
      - name: Cleanup docker containers
        uses: ./.github/actions/cleanup-container
        if: always()
        
      - name: Upload to release (Archive)
        uses: softprops/action-gh-release@v3
        with:
          files: ./build/*
          tag_name: ${{ steps.context.outputs.ARCHIVE_TAG }}
          overwrite_files: true
          prerelease: ${{ steps.context.outputs.IS_PRERELEASE == 'true' }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.get_output.outputs.BUILD_LOG }}
          files: ./build/*
          name: Build No. ${{ steps.version.outputs.NEXT_VER_CODE }}
          tag_name: ${{ steps.version.outputs.NEXT_VER_CODE }}
          overwrite_files: true
          prerelease: ${{ steps.context.outputs.IS_PRERELEASE == 'true' }}

      - name: Update changelog and module update files
        env:
          NEXT_VER_CODE: ${{ steps.version.outputs.NEXT_VER_CODE }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/build_update_changelog.sh

      - name: Commit updated build and module update files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: update
          commit_author: Sharath <sharathsukash@gmail.com> # Remove if not needed, or replace with your own name/emails 
          file_pattern: build.md *-update.json
          commit_message: Bump version ${{ steps.version.outputs.NEXT_VER_CODE }}
