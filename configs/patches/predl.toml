enable-module-update = true
patches-version = "dev"

[winlator-viamorphe-pubgvn]
enabled = true
app-name = "winlator"
rv-brand = "viamorphe"
build-mode = "apk"
cli-source = "MorpheApp/morphe-desktop"
local-dlurl = "downloads/winlator.apk"
[[winlator-viamorphe-pubgvn.patches]]
source = "MorpheApp/morphe-patches"
args = "-OpackageName='com.vng.pubgmobile'"
included-patches = "'Change Package Name'"
brand = "pubgvn"

