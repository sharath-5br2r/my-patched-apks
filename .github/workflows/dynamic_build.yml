name: Build dynamic Patches
permissions: write-all
on:
  workflow_dispatch:
    inputs:
      run-all:
        description: 'Run all jobs (including those that are not triggered by new tags)'
        required: false
        default: true
        type: boolean
  workflow_call:

jobs:
  get-tags:
    runs-on: ubuntu-latest
    outputs:
      LEVILAUNCHER_TAG: ${{ steps.get_new_tags.outputs.LEVILAUNCHER_TAG }}
      GEODE_TAG: ${{ steps.get_new_tags.outputs.GEODE_TAG }}
      FCL_TAG: ${{ steps.get_new_tags.outputs.FCL_TAG }}
      TRIGGER_LEVILAUNCHER: ${{ steps.check_build.outputs.TRIGGER_LEVILAUNCHER }}
      TRIGGER_GEODE: ${{ steps.check_build.outputs.TRIGGER_GEODE }}
      TRIGGER_FCL: ${{ steps.check_build.outputs.TRIGGER_FCL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
      - name: Get old tags
        run: |
          FCL_OLD_TAG=$(jq -r '.fcl' .github/dynamic_tags.json)
          LEVILAUNCHER_OLD_TAG=$(jq -r '.levilauncher' .github/dynamic_tags.json)
          GEODE_OLD_TAG=$(jq -r '.geode' .github/dynamic_tags.json)
          echo "FCL_OLD_TAG=$FCL_OLD_TAG" >> $GITHUB_ENV
          echo "LEVILAUNCHER_OLD_TAG=$LEVILAUNCHER_OLD_TAG" >> $GITHUB_ENV
          echo "GEODE_OLD_TAG=$GEODE_OLD_TAG" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Get New Tags
        id: get_new_tags
        run: |
          echo "LEVILAUNCHER_TAG=$(gh release view -R 0Sombra666/LeviLaunchroidUnlocked --json tagName --jq '.tagName' )" >> $GITHUB_ENV
          echo "GEODE_TAG=$(gh release view -R geode-sdk/android-launcher --json tagName --jq '.tagName' )" >> $GITHUB_ENV
          echo "FCL_TAG=$(gh release view -R FCL-Team/FoldCraftLauncher --json tagName --jq '.tagName' )" >> $GITHUB_ENV
          echo "LEVILAUNCHER_TAG=$(gh release view -R 0Sombra666/LeviLaunchroidUnlocked --json tagName --jq '.tagName' )" >> $GITHUB_OUTPUT
          echo "GEODE_TAG=$(gh release view -R geode-sdk/android-launcher --json tagName --jq '.tagName' )" >> $GITHUB_OUTPUT
          echo "FCL_TAG=$(gh release view -R FCL-Team/FoldCraftLauncher --json tagName --jq '.tagName' )" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Check whether to build
        id: check_build
        run: |
          if [ "$LEVILAUNCHER_TAG" != "$LEVILAUNCHER_OLD_TAG" ]; then
            echo "LEVILAUNCHER needs to be built"
            echo "TRIGGER_LEVILAUNCHER=true" >> $GITHUB_OUTPUT
          fi
          if [ "$GEODE_TAG" != "$GEODE_OLD_TAG" ]; then
            echo "GEODE needs to be built"
            echo "TRIGGER_GEODE=true" >> $GITHUB_OUTPUT
          fi
          if [ "$FCL_TAG" != "$FCL_OLD_TAG" ]; then
            echo "FCL needs to be built"
            echo "TRIGGER_FCL=true" >> $GITHUB_OUTPUT
          fi

  build-levilauncher:
    runs-on: ubuntu-latest
    needs: get-tags
    if: ${{ needs.get-tags.outputs.TRIGGER_LEVILAUNCHER == 'true' || github.event.inputs.run-all == 'true' }}
    env:
      LEVILAUNCHER_TAG: ${{ needs.get-tags.outputs.LEVILAUNCHER_TAG }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
      - name: Clone code
        run: |
          git clone --depth 1 --branch $LEVILAUNCHER_TAG https://github.com/0Sombra666/LeviLaunchroidUnlocked.git --recursive --shallow-submodules levilauncher
      - name: Prepare google-services.json
        run: |
          mkdir -p levilauncher/app
          cat > levilauncher/app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-placeholder",
              "storage_bucket": "ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.pubg.imobile"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyCIOnlyPlaceholderKey"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Install Build Tools 35.0.0
        run: sdkmanager "build-tools;35.0.0"

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: "2.9.9"
          actions-cache-folder: ".xmake-cache"
          actions-cache-key: "ubuntulinux-ci"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          link-to-sdk: true

      - name: Grant Execute Permission to gradlew
        run: | 
            chmod +x ./levilauncher/gradlew
    
      - name: Inject API Key
        run: echo "curseforge.api_key=$2a$10$bL4bIL5pUWqfcO7KQtnMReakwtfHbNKh6v1uTpKlzhwoueEJQnPnm" >> levilauncher/local.properties
     
      - name: Patch
        run:  |
          sed -i 's/applicationId "org\.levimc\.launcher"/applicationId "com.pubg.imobile"/' levilauncher/app/build.gradle
          sed -i 's#<string name="app_name">LeviLauncher Unlocked</string>#<string name="app_name">LeviLauncher</string>#' levilauncher/app/src/main/res/values/strings.xml
          
      - name: Build Release APKs
        run: |
         ./levilauncher/gradlew assembleRelease -p levilauncher


      - name: Extract keystore
        run: |
          echo "${{ secrets.KEYSTORE_P12}}" | base64 -d > ks.keystore
      - name: Install apksigner
        run: |
         wget -qO sdk.zip "https://dl.google.com/android/repository/build-tools_r36_linux.zip"
         unzip -q -j sdk.zip android-16/lib/apksigner.jar

      - name: Sign APK with keystore
        id: sign_apk
        run: |
          APK_IN=$(find levilauncher/app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_OUT="levilauncher-unlocked-bgmi-$LEVILAUNCHER_TAG-arm64-v8a.apk"
          java -cp "apksigner.jar" com.android.apksigner.ApkSignerTool sign    --ks ks.keystore --ks-type PKCS12 --ks-key-alias $KEYSTORE_ALIAS --ks-pass pass:$KEYSTORE_PASS --in "$APK_IN" --out "$APK_OUT" 
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: levilauncher-unlocked-bgmi-${{ needs.get-tags.outputs.LEVILAUNCHER_TAG }}-arm64-v8a.apk
          archive: false
  build-geode:
    needs: [build-levilauncher, get-tags]
    runs-on: ubuntu-latest
    if: ${{ always() && ((needs.get-tags.outputs.TRIGGER_GEODE == 'true' || github.event.inputs.run-all == 'true') && needs.build-levilauncher.result != 'cancelled') }}
    env:
      GEODE_TAG: ${{ needs.get-tags.outputs.GEODE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
      - name: Clone Code
        run: |
          git clone --depth 1 --branch ${{ needs.get-tags.outputs.GEODE_TAG }}  https://github.com/geode-sdk/android-launcher.git --recursive --shallow-submodules geode

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Fix gradle permissions
        run: chmod +x ./geode/gradlew

      - name: Patch
        run: |
          sed -i 's/applicationId = "com\.geode\.launcher"/applicationId = "com.pubg.krmobile"/' geode/app/build.gradle.kts
        
      - name: Build project
        run: |
          ./geode/gradlew app:assembleRelease -p geode

      - name: Sign universal apk and sign
        id: sign_apk
        run: |
          APK_PATH=${{github.workspace}}/geode/app/build/outputs/apk/release/app-universal-release-unsigned.apk
          echo "${{ secrets.KEYSTORE_P12 }}" | base64 --decode > ks.keystore   
          wget -qO sdk.zip "https://dl.google.com/android/repository/build-tools_r36_linux.zip"
          unzip -q -j sdk.zip android-16/lib/apksigner.jar
          java -cp "apksigner.jar" com.android.apksigner.ApkSignerTool sign --ks ks.keystore --ks-type PKCS12 --ks-key-alias $KEYSTORE_ALIAS --ks-pass pass:$KEYSTORE_PASS --in $APK_PATH --out "./geode-pubgkr-v$GEODE_TAG-all.apk"
        env:
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: geode-pubgkr-v${{ needs.get-tags.outputs.GEODE_TAG }}-all.apk
          archive: false
  build-fcl:
    needs: [build-levilauncher, build-geode, get-tags]
    if: ${{ always() && ((needs.get-tags.outputs.TRIGGER_FCL == 'true' || github.event.inputs.run-all == 'true' ) && needs.build-levilauncher.result != 'cancelled' && needs.build-geode.result != 'cancelled') }}
    runs-on: ubuntu-latest
    env:
      FCL_TAG: ${{ needs.get-tags.outputs.FCL_TAG }}
      OAUTH_API_KEY: ${{ secrets.FCL_OAUTH_KEY }}
      CURSE_API_KEY: "$2a$10$bL4bIL5pUWqfcO7KQtnMReakwtfHbNKh6v1uTpKlzhwoueEJQnPnm"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1 
      - name: Clone Code
        run: |
          git clone --depth 1 --branch $FCL_TAG https://github.com/FCL-Team/FoldCraftLauncher.git --recursive --shallow-submodules fcl
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle
      - name: Fix gradle permissions
        run: chmod +x ./fcl/gradlew
      - name: Patch
        run: |
          sed -i 's/signingConfig = signingConfigs\.getByName("FCLKey")/signingConfig = signingConfigs.getByName("FCLDebugKey")/' fcl/FCL/build.gradle.kts
          sed -i 's/applicationId = "com\.tungsten\.fcl"/applicationId = "com.activision.callofduty.shooter"/' fcl/FCL/build.gradle.kts
      - name: Build project
        run: |
          ./fcl/gradlew assemblerelease -Darch=all -p fcl
      - name: Sign APK with keystore
        id: sign_apk
        run: |
          echo "${{ secrets.KEYSTORE_P12 }}" | base64 --decode > ks.keystore
          wget -qO sdk.zip "https://dl.google.com/android/repository/build-tools_r36_linux.zip"
          unzip -q -j sdk.zip android-16/lib/apksigner.jar
          java -cp "apksigner.jar" com.android.apksigner.ApkSignerTool sign --ks ks.keystore --ks-type PKCS12 --ks-key-alias $KEYSTORE_ALIAS --ks-pass pass:$KEYSTORE_PASS --in ./fcl/FCL/build/outputs/apk/release/*.apk --out "./fcl-cod-v$FCL_TAG-all.apk"
        env:
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: ./fcl-cod-v${{ needs.get-tags.outputs.FCL_TAG }}-all.apk
          archive: false
  release:
    runs-on: ubuntu-latest
    needs: [build-levilauncher, build-geode, build-fcl, get-tags]
    if: ${{ always() && (needs.build-levilauncher.result == 'success' || needs.build-geode.result == 'success' || needs.build-fcl.result == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
      - name: Resolve build context
        id: context
        run: bash .github/scripts/build_resolve_context.sh custom

      - name: Resolve version code
        id: version
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: bash .github/scripts/build_resolve_version.sh
    
      - name: Generate build.md and build.json
        run: |
           echo -e "{" >> build.json
           if [ $TRIGGER_LEVILAUNCHER == "true" ]; then
             echo -e "\"levilauncher-bgmi\": { \"exts\": [\"apk\"], \"name\": \"levilauncher-unlocked-bgmi\",\"arch\": \"arm64-v8a\",\"patch\": \"bgmi\", \"version\": \"$LEVILAUNCHER_TAG\" }," >> build.json
             echo  -e "Patched and signed the following APK:\n- levilauncher-unlocked-bgmi-$LEVILAUNCHER_TAG.apk\n" >> build.md
           fi
           if [ $TRIGGER_GEODE == "true" ]; then
             echo -e "\"geode-pubgkr\": { \"exts\": [\"apk\"], \"name\": \"geode-pubgkr\",\"arch\": \"all\",\"patch\": \"pubgkr\", \"version\": \"$GEODE_TAG\" }," >> build.json
             echo  -e "Patched and signed the following APK:\n- geode-pubgkr-$GEODE_TAG.apk\n" >> build.md
           fi
           if [ $TRIGGER_FCL == "true" ]; then
             echo -e "\"fcl-cod\": { \"exts\": [\"apk\"], \"name\": \"fcl-cod\",\"arch\": \"all\",\"patch\": \"cod\", \"version\": \"$FCL_TAG\" }" >> build.json
             echo  -e "Patched and signed the following APK:\n- fcl-cod-$FCL_TAG.apk\n" >> build.md
           fi
           echo -e "}" >> build.json
           echo -e "{\"fcl\":\"$FCL_TAG\",\"levilauncher\":\"$LEVILAUNCHER_TAG\",\"geode\":\"$GEODE_TAG\"}" > .github/dynamic_tags.json
        env:
          LEVILAUNCHER_TAG: ${{ needs.get-tags.outputs.LEVILAUNCHER_TAG }}
          GEODE_TAG: ${{ needs.get-tags.outputs.GEODE_TAG }}
          FCL_TAG: ${{ needs.get-tags.outputs.FCL_TAG }}
          TRIGGER_LEVILAUNCHER: ${{ needs.get-tags.outputs.TRIGGER_LEVILAUNCHER }}
          TRIGGER_FCL: ${{ needs.get-tags.outputs.TRIGGER_FCL }}
          TRIGGER_GEODE: ${{ needs.get-tags.outputs.TRIGGER_GEODE }}
      - name: Get output
        id: get_output
        run: bash .github/scripts/build_get_output.sh

      - name: Update readme
        run: |
          python3 update-readme.py ${{ steps.version.outputs.NEXT_VER_CODE }} "$GITHUB_REPOSITORY"

      - name: Commit updated readme and configs
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_author: Sharath <sharathsukash@gmail.com>
          file_pattern: README.md .github/dynamic_tags.json
          commit_message: "Update README for Build No. ${{ steps.version.outputs.NEXT_VER_CODE }} [skip ci]"
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: .

      - name: Upload to release (Archive)
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          files: |
              ./*/*.apk
          tag_name: ${{ steps.context.outputs.ARCHIVE_TAG }}
          overwrite_files: true

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.get_output.outputs.BUILD_LOG }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          files: |
             ./*/*.apk
          name: Build No. ${{ steps.version.outputs.NEXT_VER_CODE }}
          tag_name: ${{ steps.version.outputs.NEXT_VER_CODE }}
          overwrite_files: true
          prerelease: ${{ steps.context.outputs.IS_PRERELEASE == 'true' }}
  
      
