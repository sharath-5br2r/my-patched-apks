enable-module-update = true
patches-version = "dev"


[gboard-jasonwu1994]
enabled = true
app-name = "gboard"
rv-brand = "jasonwu1994"
build-mode = "apk"
arch = "arm64-v8a"
cli-source = "MorpheApp/morphe-desktop"
uptodown-dlurl = "https://gboard-go.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/gboard"
dpi = "nodpi anydpi auto"
[[gboard-jasonwu1994-gmscore.patches]]
source = "jasonwu1994/Gboard-patches"
excluded-patches = "'Package Rename'"
[[gboard-jasonwu1994-gmscore.patches]]
source = "rushiranpise/morphe-patches"
included-patches = "'GmsCore Support (MicroG)'"
args = "-OpackageName=dev.jason.com.google.android.inputmethod.latin"

[gboard-jasonwu1994-root]
enabled = true
app-name = "gboard"
rv-brand = "jasonwu1994"
build-mode = "module"
arch = "arm64-v8a"
cli-source = "MorpheApp/morphe-desktop"
uptodown-dlurl = "https://gboard-go.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/gboard"
dpi = "nodpi anydpi auto"
[[gboard-jasonwu1994-root.patches]]
source = "jasonwu1994/Gboard-patches"
excluded-patches = "'Package Rename'"
