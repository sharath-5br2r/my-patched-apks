enable-module-update = true
patches-version = "dev"


[gboard-morphe-gboard]
enabled = true
app-name = "gboard"
rv-brand = "morphe"
build-mode = "apk"
arch = "arm64-v8a"
cli-source = "MorpheApp/morphe-desktop"
uptodown-dlurl = "https://gboard-go.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/gboard"
dpi = "nodpi anydpi auto"
[[gboard-morphe-gboard.patches]]
source = "jasonwu1994/Gboard-patches"
brand = "jasonwu1994"


[gboard-morphe-gboard-root]
enabled = true
app-name = "gboard"
rv-brand = "morphe"
build-mode = "module"
arch = "arm64-v8a"
cli-source = "MorpheApp/morphe-desktop"
uptodown-dlurl = "https://gboard-go.en.uptodown.com/android"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/gboard"
dpi = "nodpi anydpi auto"
[[gboard-morphe-gboard-root.patches]]
source = "jasonwu1994/Gboard-patches"
excluded-patches = "'Package Rename'"
brand = "jasonwu1994"
